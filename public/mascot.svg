<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Software engineer eagle mascot</title>
  <desc id="desc">A flat vector cartoon eagle mascot with red eyes, black hoodie with dark gray 10x logo, laptop, and plain coffee cup.</desc>
  <defs>
    <linearGradient id="whiteHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="hoodie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252b2f"/>
      <stop offset="1" stop-color="#171c1f"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b3a22"/>
      <stop offset="1" stop-color="#3f2919"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#ffffff"/>
  <ellipse cx="512" cy="921" rx="260" ry="22" fill="#d9d9d9"/>

  <!-- Body and feet -->
  <ellipse cx="512" cy="720" rx="220" ry="185" fill="url(#body)"/>
  <rect x="359" y="860" width="130" height="56" rx="26" fill="#ffb000"/>
  <rect x="535" y="860" width="130" height="56" rx="26" fill="#ffb000"/>

  <!-- Hoodie -->
  <path d="M246 430c5-63 68-91 121-73 35-70 247-70 282 0 53-18 116 10 121 73 9 104-19 237-76 328-25 39-110 58-182 58s-157-19-182-58c-57-91-85-224-76-328z" fill="url(#hoodie)" filter="url(#softShadow)"/>
  <path d="M310 445c16-85 96-137 202-137s186 52 202 137c-52 34-113 53-202 53s-150-19-202-53z" fill="#15191c" opacity="0.85"/>
  <path d="M330 454c44 66 107 100 182 100s138-34 182-100c-14 67-72 134-182 134s-168-67-182-134z" fill="#101416" opacity="0.35"/>

  <!-- Wings / hands -->
  <ellipse cx="240" cy="721" rx="78" ry="100" fill="#5a3921" transform="rotate(-18 240 721)"/>
  <ellipse cx="786" cy="713" rx="74" ry="99" fill="#5a3921" transform="rotate(12 786 713)"/>

  <!-- Laptop -->
  <g transform="translate(54 508) rotate(-8)">
    <rect x="0" y="0" width="285" height="225" rx="20" fill="#666a6d"/>
    <rect x="18" y="18" width="249" height="189" rx="14" fill="#5b5f62"/>
    <path d="M130 83l-44 40 44 40" fill="none" stroke="#b6b8ba" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M174 83l44 40-44 40" fill="none" stroke="#b6b8ba" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M159 78l-26 91" fill="none" stroke="#b6b8ba" stroke-width="18" stroke-linecap="round"/>
    <path d="M68 219h230c22 0 39 18 39 39H114c-32 0-46-17-46-39z" fill="#777b7e"/>
  </g>

  <!-- Coffee mug, no logo -->
  <g transform="translate(766 596)">
    <rect x="0" y="0" width="160" height="173" rx="34" fill="#22282b"/>
    <ellipse cx="80" cy="24" rx="67" ry="22" fill="#15191c"/>
    <ellipse cx="80" cy="25" rx="54" ry="13" fill="#3a230f"/>
    <path d="M152 42c54 0 54 96 0 96" fill="none" stroke="#22282b" stroke-width="28" stroke-linecap="round"/>
    <path d="M82-90c-24 37 31 49 6 91" fill="none" stroke="#d7d7d7" stroke-width="18" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- Head -->
  <path d="M319 165c-3-71 54-101 125-69 39 17 97 17 136 0 71-32 128-2 125 69 52-21 89 14 78 84 37 72 15 167-49 205-29 17-67 20-105 11-28 56-71 84-117 84s-89-28-117-84c-38 9-76 6-105-11-64-38-86-133-49-205-11-70 26-105 78-84z" fill="url(#whiteHead)" filter="url(#softShadow)"/>
  <path d="M319 165c42 1 64 21 80 44 31-35 64-52 113-52s82 17 113 52c16-23 38-43 80-44" fill="none" stroke="#d9dadb" stroke-width="14" stroke-linecap="round" opacity="0.8"/>

  <!-- Eyes -->
  <g>
    <path d="M348 293c28-61 94-65 129-4 24 41-4 103-61 103-54 0-91-49-68-99z" fill="#ffffff"/>
    <path d="M676 293c-28-61-94-65-129-4-24 41 4 103 61 103 54 0 91-49 68-99z" fill="#ffffff"/>
    <path d="M381 269c42 11 73 54 66 94-4 26-22 44-48 44-36 0-63-34-63-76 0-29 15-52 45-62z" fill="#d21f27"/>
    <path d="M643 269c-42 11-73 54-66 94 4 26 22 44 48 44 36 0 63-34 63-76 0-29-15-52-45-62z" fill="#d21f27"/>
    <rect x="383" y="284" width="45" height="84" rx="22" fill="#17242a"/>
    <rect x="596" y="284" width="45" height="84" rx="22" fill="#17242a"/>
    <circle cx="377" cy="281" r="23" fill="#ffffff"/>
    <circle cx="590" cy="281" r="23" fill="#ffffff"/>
  </g>

  <!-- Beak -->
  <path d="M459 355c10-36 96-36 106 0 8 29-28 62-53 62s-61-33-53-62z" fill="#ffbf00"/>
  <path d="M467 382c34 32 56 32 90 0-7 29-25 45-45 45s-38-16-45-45z" fill="#f29a00"/>

  <!-- Feather points -->
  <path d="M415 484c16 39 45 67 97 67s81-28 97-67c-29 23-58 32-97 32s-68-9-97-32z" fill="#ffffff"/>
  <path d="M407 459c9 52 25 76 55 95 0-38 0-55-12-86z" fill="#ffffff"/>
  <path d="M617 459c-9 52-25 76-55 95 0-38 0-55 12-86z" fill="#ffffff"/>

  <!-- Hoodie strings and 10x -->
  <path d="M464 558v69" stroke="#f6f6f6" stroke-width="14" stroke-linecap="round"/>
  <path d="M560 558v69" stroke="#f6f6f6" stroke-width="14" stroke-linecap="round"/>
  <circle cx="464" cy="634" r="13" fill="#f6f6f6"/>
  <circle cx="560" cy="634" r="13" fill="#f6f6f6"/>
  <text x="512" y="744" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="92" font-weight="900" fill="#11171a" opacity="0.82">10x</text>
</svg>
